<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RAG Runtime Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; }
    textarea { width: 100%; height: 6rem; }
    pre { background:#f6f8fa; padding:1rem; border-radius:6px; }
    label { display:block; margin-top:0.5rem; }
    button { margin-top:0.5rem; }
  </style>
</head>
<body>
  <h1>RAG Runtime — Quick Test</h1>
  <form id="qform">
    <label>Question</label>
    <textarea id="question">What is RobotStudio?</textarea>
    <label><input type="checkbox" id="agentic" /> Agentic</label>
    <label>Search limit <input type="number" id="search_limit" value="50" min="1" /></label>
    <label>Top passages <input type="number" id="top_passages" value="10" min="1" /></label>
    <label><input type="checkbox" id="use_reranker" checked /> Use reranker</label>
    <button type="submit">Query</button>
  </form>

  <h2>Response</h2>
  <pre id="output">No response yet.</pre>

<script>
document.getElementById('qform').addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = document.getElementById('question').value;
  const agentic = document.getElementById('agentic').checked;
  const search_limit = parseInt(document.getElementById('search_limit').value, 10);
  const top_passages = parseInt(document.getElementById('top_passages').value, 10);
  const use_reranker = document.getElementById('use_reranker').checked;

  const body = { question, agentic, search_limit, top_passages, use_reranker };
  document.getElementById('output').textContent = 'Thinking...';

  try {
    const res = await fetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    document.getElementById('output').textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    document.getElementById('output').textContent = String(err);
  }
});
</script>
</body>
</html>
