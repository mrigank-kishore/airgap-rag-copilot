services:
  app:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./storage/qdrant:/qdrant/storage
      - ./infra/qdrant/config.yaml:/qdrant/config/production.yaml:ro

  langfuse:
    image: langfuse/langfuse:latest
    profiles:
      - observability
    ports:
      - "3000:3000"

  tei-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    profiles:
      - models
    ports:
      - "8080:80"
    volumes:
      - ./models/embeddings:/models

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    profiles:
      - models
    ports:
      - "8081:80"
    volumes:
      - ./models/rerankers:/models

  vllm:
    image: vllm/vllm-openai:latest
    profiles:
      - models
    ports:
      - "8001:8000"
    volumes:
      - ./models/llm:/models
